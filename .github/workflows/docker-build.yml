name: Docker Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t local-llm-chatbot .

      - name: Verify build
        run: docker run --rm --entrypoint python local-llm-chatbot -c "import src; print('Build OK')"
